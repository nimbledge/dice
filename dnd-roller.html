<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dice roller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --base: #1e1e2e;
    --mantle: #181825;
    --crust: #11111b;
    --surface0: #313244;
    --surface1: #45475a;
    --surface2: #585b70;
    --overlay0: #6c7086;
    --overlay1: #7f849c;
    --overlay2: #9399b2;
    --text: #cdd6f4;
    --subtext0: #a6adc8;
    --subtext1: #bac2de;
    --lavender: #b4befe;
    --blue: #89b4fa;
    --sapphire: #74c7ec;
    --sky: #89dceb;
    --teal: #94e2d5;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --peach: #fab387;
    --maroon: #eba0ac;
    --red: #f38ba8;
    --mauve: #cba6f7;
    --pink: #f5c2e7;
    --flamingo: #f2cdcd;
    --rosewater: #f5e0dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--base);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--surface0);
    padding-bottom: 1rem;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--mauve);
    letter-spacing: 0.05em;
  }

  header span {
    font-size: 0.7rem;
    color: var(--overlay0);
  }

  .tabs {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    background: var(--mantle);
    border-radius: 8px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    padding: 0.5rem;
    border: none;
    background: transparent;
    color: var(--overlay1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .tab.active {
    background: var(--surface0);
    color: var(--mauve);
  }

  .tab:hover:not(.active) { color: var(--subtext1); }

  .panel { display: none; width: 100%; max-width: 680px; }
  .panel.active { display: block; }

  /* ── DICE PANEL ── */
  .dice-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }

  .die-btn {
    aspect-ratio: 1;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    color: var(--subtext1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
  }

  .die-btn .shortcut {
    font-size: 0.6rem;
    color: var(--overlay0);
  }

  .die-btn:hover {
    border-color: var(--mauve);
    color: var(--mauve);
    background: var(--surface0);
  }

  .die-btn:active { transform: scale(0.95); }

  .die-btn.d20 { border-color: var(--lavender); color: var(--lavender); }
  .die-btn.d20:hover { background: var(--surface0); }

  .modifier-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .modifier-row label { font-size: 0.7rem; color: var(--overlay1); }

  .modifier-row input {
    width: 70px;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    text-align: center;
  }

  .modifier-row input:focus {
    outline: none;
    border-color: var(--mauve);
  }

  .count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .count-row label { font-size: 0.7rem; color: var(--overlay1); }

  .count-btn {
    width: 28px; height: 28px;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    color: var(--subtext1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }

  .count-btn:hover { border-color: var(--mauve); color: var(--mauve); }

  #count-display {
    font-size: 0.85rem;
    color: var(--text);
    min-width: 20px;
    text-align: center;
  }

  .adv-row {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
  }

  .adv-btn {
    padding: 0.35rem 0.8rem;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    color: var(--overlay1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.1s;
  }

  .adv-btn:hover { border-color: var(--surface2); color: var(--subtext1); }
  .adv-btn.active-adv { border-color: var(--green); color: var(--green); background: var(--surface0); }
  .adv-btn.active-dis { border-color: var(--red); color: var(--red); background: var(--surface0); }

  .result-box {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
  }

  .result-number {
    font-size: 3rem;
    font-weight: 600;
    color: var(--mauve);
    line-height: 1;
    transition: all 0.1s;
  }

  .result-number.crit { color: var(--green); }
  .result-number.fail { color: var(--red); }

  .result-label {
    font-size: 0.7rem;
    color: var(--overlay0);
    margin-top: 4px;
  }

  .result-breakdown {
    font-size: 0.7rem;
    color: var(--overlay1);
    margin-top: 6px;
  }

  .history {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 1.5rem;
    min-height: 24px;
  }

  .history-chip {
    font-size: 0.65rem;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    color: var(--overlay1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* ── QUICK ROLL PANEL ── */
  .section-label {
    font-size: 0.65rem;
    color: var(--overlay0);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    margin-top: 1.25rem;
  }

  .section-label:first-child { margin-top: 0; }

  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .saved-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }

  .saved-item:hover { border-color: var(--surface2); background: var(--surface0); }

  .saved-key {
    font-size: 0.65rem;
    background: var(--surface1);
    color: var(--overlay2);
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 22px;
    text-align: center;
  }

  .saved-name {
    flex: 1;
    font-size: 0.8rem;
    color: var(--subtext1);
  }

  .saved-notation {
    font-size: 0.72rem;
    color: var(--overlay1);
  }

  .saved-result {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--mauve);
    min-width: 30px;
    text-align: right;
  }

  .saved-del {
    background: none;
    border: none;
    color: var(--overlay0);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0 2px;
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.1s;
  }

  .saved-del:hover { color: var(--red); }

  .add-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 10px;
    padding: 1rem;
  }

  .add-form-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-form input {
    background: var(--crust);
    border: 1px solid var(--surface0);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    flex: 1;
  }

  .add-form input:focus { outline: none; border-color: var(--mauve); }
  .add-form input::placeholder { color: var(--overlay0); }

  .add-form label {
    font-size: 0.65rem;
    color: var(--overlay0);
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--mauve);
    color: var(--crust);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.1s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .empty-state {
    font-size: 0.75rem;
    color: var(--overlay0);
    text-align: center;
    padding: 1rem;
  }

  /* keyboard hint bar */
  .hint-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--mantle);
    border-top: 1px solid var(--surface0);
    display: flex;
    gap: 1rem;
    justify-content: center;
    padding: 0.5rem 1rem;
    flex-wrap: wrap;
  }

  .hint {
    font-size: 0.62rem;
    color: var(--overlay0);
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .hint kbd {
    background: var(--surface0);
    color: var(--subtext0);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
  }

  .flash {
    animation: flash 0.18s ease;
  }

  @keyframes flash {
    0% { opacity: 0.3; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }

  .crit-banner {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 0.6rem;
    color: var(--green);
    letter-spacing: 0.1em;
  }

  .adv-dice {
    display: flex;
    gap: 12px;
    align-items: baseline;
  }

  .adv-dice .dim {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--surface2);
    text-decoration: line-through;
  }
</style>
</head>
<body>

<header>
  <h1>⚔ dice roller</h1>
  <span>catppuccin mocha · keyboard enabled</span>
</header>

<div class="tabs">
  <button class="tab active" id="tab-dice" onclick="switchTab('dice')">[ A ] roll dice</button>
  <button class="tab" id="tab-quick" onclick="switchTab('quick')">[ B ] quick roll</button>
</div>

<!-- PANEL A: DICE -->
<div class="panel active" id="panel-dice">
  <div class="dice-grid">
    <button class="die-btn" onclick="rollDie(4)" title="d4 (key: 1)">
      <span>d4</span><span class="shortcut">1</span>
    </button>
    <button class="die-btn" onclick="rollDie(6)" title="d6 (key: 2)">
      <span>d6</span><span class="shortcut">2</span>
    </button>
    <button class="die-btn" onclick="rollDie(8)" title="d8 (key: 3)">
      <span>d8</span><span class="shortcut">3</span>
    </button>
    <button class="die-btn" onclick="rollDie(10)" title="d10 (key: 4)">
      <span>d10</span><span class="shortcut">4</span>
    </button>
    <button class="die-btn" onclick="rollDie(12)" title="d12 (key: 5)">
      <span>d12</span><span class="shortcut">5</span>
    </button>
    <button class="die-btn d20" onclick="rollDie(20)" title="d20 (key: 6)">
      <span>d20</span><span class="shortcut">6</span>
    </button>
    <button class="die-btn" onclick="rollDie(100)" title="d100 (key: 7)">
      <span>d100</span><span class="shortcut">7</span>
    </button>
    <button class="die-btn" onclick="rollDie(lastDie)" title="re-roll (key: R)">
      <span>↺</span><span class="shortcut">R</span>
    </button>
  </div>

  <div class="count-row">
    <label>dice count:</label>
    <button class="count-btn" onclick="changeCount(-1)">−</button>
    <span id="count-display">1</span>
    <button class="count-btn" onclick="changeCount(1)">+</button>
  </div>

  <div class="modifier-row">
    <label>modifier:</label>
    <input type="number" id="modifier" value="0" min="-99" max="99" />
  </div>

  <div class="adv-row" id="adv-row">
    <button class="adv-btn" id="btn-normal" onclick="setAdv('normal')">normal</button>
    <button class="adv-btn" id="btn-adv" onclick="setAdv('adv')">advantage</button>
    <button class="adv-btn" id="btn-dis" onclick="setAdv('dis')">disadvantage</button>
  </div>

  <div class="result-box" id="result-box">
    <span class="crit-banner" id="crit-banner"></span>
    <div id="adv-display" class="adv-dice" style="display:none"></div>
    <div class="result-number" id="result-number">—</div>
    <div class="result-label" id="result-label">pick a die</div>
    <div class="result-breakdown" id="result-breakdown"></div>
  </div>

  <div class="history" id="history"></div>
</div>

<!-- PANEL B: QUICK ROLL -->
<div class="panel" id="panel-quick">
  <p class="section-label">saved rolls</p>

  <div class="saved-list" id="saved-list">
    <div class="empty-state" id="empty-state">no saved rolls yet — add one below</div>
  </div>

  <p class="section-label">add roll</p>
  <div class="add-form">
    <div class="add-form-row">
      <label>name:</label>
      <input type="text" id="new-name" placeholder="e.g. Fireball, Longsword hit" maxlength="30" />
    </div>
    <div class="add-form-row">
      <label>notation:</label>
      <input type="text" id="new-notation" placeholder="e.g. 8d6 or 1d8+4 or 2d6+3" />
      <button class="btn-primary" onclick="addSaved()">save</button>
    </div>
    <div style="font-size:0.62rem; color: var(--overlay0);">
      format: NdX+M — e.g. 2d6+3, 1d20-1, 4d6
    </div>
  </div>
</div>

<div class="hint-bar">
  <span class="hint"><kbd>A</kbd> dice tab</span>
  <span class="hint"><kbd>B</kbd> quick tab</span>
  <span class="hint"><kbd>1-7</kbd> roll die</span>
  <span class="hint"><kbd>R</kbd> re-roll</span>
  <span class="hint"><kbd>+/-</kbd> modifier</span>
  <span class="hint"><kbd>Space</kbd> roll again</span>
  <span class="hint"><kbd>1-9</kbd> quick roll (B tab)</span>
</div>

<script>
  let lastDie = 20;
  let diceCount = 1;
  let advMode = 'normal';
  let history = [];
  let savedRolls = JSON.parse(localStorage.getItem('dnd_saved') || '[]');
  let currentTab = 'dice';

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'quick') renderSaved();
  }

  function setAdv(mode) {
    advMode = mode;
    document.getElementById('btn-normal').className = 'adv-btn' + (mode === 'normal' ? '' : '');
    document.getElementById('btn-adv').className = 'adv-btn' + (mode === 'adv' ? ' active-adv' : '');
    document.getElementById('btn-dis').className = 'adv-btn' + (mode === 'dis' ? ' active-dis' : '');
    if (mode === 'normal') document.getElementById('btn-normal').classList.add('active-adv');
    else document.getElementById('btn-normal').classList.remove('active-adv');
  }

  setAdv('normal');

  function r(sides) { return Math.floor(Math.random() * sides) + 1; }

  function changeCount(delta) {
    diceCount = Math.max(1, Math.min(20, diceCount + delta));
    document.getElementById('count-display').textContent = diceCount;
  }

  function rollDie(sides) {
    if (!sides || sides < 2) sides = lastDie;
    lastDie = sides;
    const mod = parseInt(document.getElementById('modifier').value) || 0;
    const count = diceCount;

    let rolls = [];
    for (let i = 0; i < count; i++) rolls.push(r(sides));

    let mainRoll, breakdown, total, isCrit = false, isFail = false;
    let advDisplay = null;

    if (advMode !== 'normal' && sides === 20 && count === 1) {
      const r2 = r(sides);
      const r1 = rolls[0];
      const kept = advMode === 'adv' ? Math.max(r1, r2) : Math.min(r1, r2);
      const dropped = advMode === 'adv' ? Math.min(r1, r2) : Math.max(r1, r2);
      mainRoll = kept;
      total = kept + mod;
      advDisplay = { kept, dropped, mod, label: advMode === 'adv' ? 'advantage' : 'disadvantage' };
      breakdown = '';
      if (kept === 20) { isCrit = true; }
      if (kept === 1) { isFail = true; }
    } else {
      const sum = rolls.reduce((a, b) => a + b, 0);
      total = sum + mod;
      mainRoll = sum;
      breakdown = count > 1 ? '[' + rolls.join(', ') + ']' + (mod !== 0 ? (mod > 0 ? ' +' : ' ') + mod : '') : '';
      if (count === 1 && sides === 20 && rolls[0] === 20) isCrit = true;
      if (count === 1 && sides === 20 && rolls[0] === 1) isFail = true;
    }

    const numEl = document.getElementById('result-number');
    const labelEl = document.getElementById('result-label');
    const breakEl = document.getElementById('result-breakdown');
    const critEl = document.getElementById('crit-banner');
    const advEl = document.getElementById('adv-display');

    numEl.className = 'result-number' + (isCrit ? ' crit' : isFail ? ' fail' : '');
    numEl.textContent = total;
    numEl.classList.add('flash');
    setTimeout(() => numEl.classList.remove('flash'), 200);

    if (advDisplay) {
      advEl.style.display = 'flex';
      numEl.style.display = 'none';
      advEl.innerHTML = `
        <span class="${advDisplay.kept === advDisplay.dropped ? 'result-number' : (isCrit ? 'result-number crit' : isFail ? 'result-number fail' : 'result-number')}">${advDisplay.kept + (mod !== 0 ? (mod > 0 ? '+' : '') + mod : '')}</span>
        <span class="dim">${advDisplay.dropped}</span>
      `;
      advEl.classList.add('flash');
      setTimeout(() => advEl.classList.remove('flash'), 200);
    } else {
      advEl.style.display = 'none';
      numEl.style.display = '';
    }

    const modStr = mod !== 0 ? (mod > 0 ? '+' + mod : mod) : '';
    labelEl.textContent = count + 'd' + sides + modStr + (advDisplay ? ' (' + advDisplay.label + ')' : '');
    breakEl.textContent = breakdown;
    critEl.textContent = isCrit ? '★ natural 20' : isFail ? '☆ natural 1' : '';

    addHistory(count + 'd' + sides + modStr + ' = ' + total);
  }

  function addHistory(entry) {
    history.unshift(entry);
    if (history.length > 12) history.pop();
    const el = document.getElementById('history');
    el.innerHTML = history.map(h => `<span class="history-chip">${h}</span>`).join('');
  }

  function parseNotation(str) {
    str = str.trim().toLowerCase().replace(/\s/g, '');
    const m = str.match(/^(\d+)d(\d+)([+-]\d+)?$/);
    if (!m) return null;
    return { count: parseInt(m[1]), sides: parseInt(m[2]), mod: parseInt(m[3] || 0) };
  }

  function rollNotation(notation) {
    const p = parseNotation(notation);
    if (!p) return null;
    let rolls = [];
    for (let i = 0; i < p.count; i++) rolls.push(r(p.sides));
    const sum = rolls.reduce((a, b) => a + b, 0) + p.mod;
    return { total: sum, rolls, ...p };
  }

  function addSaved() {
    const name = document.getElementById('new-name').value.trim();
    const notation = document.getElementById('new-notation').value.trim();
    if (!name || !notation) return;
    if (!parseNotation(notation)) { alert('invalid notation — use format like 2d6+3'); return; }
    savedRolls.push({ name, notation, lastResult: null });
    savePersist();
    document.getElementById('new-name').value = '';
    document.getElementById('new-notation').value = '';
    renderSaved();
  }

  function deleteSaved(i) {
    savedRolls.splice(i, 1);
    savePersist();
    renderSaved();
  }

  function rollSaved(i) {
    const s = savedRolls[i];
    const result = rollNotation(s.notation);
    if (!result) return;
    savedRolls[i].lastResult = result.total;
    savePersist();
    renderSaved();
    addHistory(s.name + ': ' + s.notation + ' = ' + result.total);
  }

  function savePersist() {
    localStorage.setItem('dnd_saved', JSON.stringify(savedRolls));
  }

  function renderSaved() {
    const list = document.getElementById('saved-list');
    const empty = document.getElementById('empty-state');
    if (savedRolls.length === 0) {
      list.innerHTML = '<div class="empty-state" id="empty-state">no saved rolls yet — add one below</div>';
      return;
    }
    list.innerHTML = savedRolls.map((s, i) => `
      <div class="saved-item" onclick="rollSaved(${i})">
        <span class="saved-key">${i + 1}</span>
        <span class="saved-name">${s.name}</span>
        <span class="saved-notation">${s.notation}</span>
        <span class="saved-result">${s.lastResult !== null ? s.lastResult : '—'}</span>
        <button class="saved-del" onclick="event.stopPropagation(); deleteSaved(${i})">✕</button>
      </div>
    `).join('');
  }

  renderSaved();

  const DICE_KEYS = { '1': 4, '2': 6, '3': 8, '4': 10, '5': 12, '6': 20, '7': 100 };

  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName.toLowerCase();
    if (tag === 'input') return;

    const key = e.key.toLowerCase();

    if (key === 'a') { switchTab('dice'); return; }
    if (key === 'b') { switchTab('quick'); return; }

    if (currentTab === 'dice') {
      if (DICE_KEYS[e.key]) { rollDie(DICE_KEYS[e.key]); return; }
      if (key === 'r') { rollDie(lastDie); return; }
      if (key === ' ') { e.preventDefault(); rollDie(lastDie); return; }
      if (key === '=' || key === '+') { changeCount(1); return; }
      if (key === '-') { changeCount(-1); return; }
    }

    if (currentTab === 'quick') {
      const idx = parseInt(e.key) - 1;
      if (!isNaN(idx) && idx >= 0 && idx < savedRolls.length) {
        rollSaved(idx);
        return;
      }
    }
  });
</script>
</body>
</html>
