
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dice roller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --base:#1e1e2e;--mantle:#181825;--crust:#11111b;
  --surface0:#313244;--surface1:#45475a;--surface2:#585b70;
  --overlay0:#6c7086;--overlay1:#7f849c;--overlay2:#9399b2;
  --text:#cdd6f4;--subtext0:#a6adc8;--subtext1:#bac2de;
  --lavender:#b4befe;--blue:#89b4fa;--sapphire:#74c7ec;
  --teal:#94e2d5;--green:#a6e3a1;--yellow:#f9e2af;
  --peach:#fab387;--red:#f38ba8;--mauve:#cba6f7;--pink:#f5c2e7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--base);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  display:grid;
  grid-template-columns:1fr 260px;
  grid-template-rows:auto 1fr auto;
  grid-template-areas:"header result" "left result" "hints hints";
  height:100vh;
  overflow:hidden;
}

/* ── HEADER ── */
header{
  grid-area:header;
  padding:1rem 1.25rem 0.75rem;
  border-bottom:1px solid var(--surface0);
  display:flex;align-items:center;gap:0;
}
.tabs{display:flex;gap:0;background:var(--mantle);border-radius:7px;padding:3px;}
.tab{
  padding:0.35rem 1rem;border:none;background:transparent;
  color:var(--overlay1);font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;cursor:pointer;border-radius:5px;transition:all .15s;
}
.tab.active{background:var(--surface0);color:var(--mauve);}
.tab:hover:not(.active){color:var(--subtext1);}

/* ── LEFT PANELS ── */
.panel{display:none;grid-area:left;overflow-y:auto;padding:1rem 1.25rem 1rem;}
.panel.active{display:block;}

/* ── DICE PANEL ── */
.dice-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:0.85rem;
}
.die-btn{
  aspect-ratio:1;background:var(--mantle);border:1px solid var(--surface0);
  color:var(--subtext1);font-family:'JetBrains Mono',monospace;
  font-size:0.82rem;font-weight:500;cursor:pointer;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:all .1s;
}
.die-btn .k{font-size:0.58rem;color:var(--overlay0);}
.die-btn:hover{border-color:var(--mauve);color:var(--mauve);background:var(--surface0);}
.die-btn:active{transform:scale(.95);}
.die-btn.d20{border-color:var(--lavender);color:var(--lavender);}

.controls-row{
  display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.75rem;
}
.ctrl-label{font-size:0.65rem;color:var(--overlay0);margin-right:2px;}

.count-btn{
  width:26px;height:26px;background:var(--mantle);border:1px solid var(--surface0);
  color:var(--subtext1);font-family:'JetBrains Mono',monospace;font-size:0.9rem;
  cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.count-btn:hover{border-color:var(--mauve);color:var(--mauve);}
#count-display{font-size:0.82rem;min-width:18px;text-align:center;}

.mod-input{
  width:58px;background:var(--mantle);border:1px solid var(--surface0);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.8rem;
  padding:0.3rem 0.4rem;border-radius:5px;text-align:center;
}
.mod-input:focus{outline:none;border-color:var(--mauve);}

.adv-row{display:flex;gap:5px;margin-bottom:0.85rem;}
.adv-btn{
  flex:1;padding:0.32rem 0;background:var(--mantle);border:1px solid var(--surface0);
  color:var(--overlay1);font-family:'JetBrains Mono',monospace;
  font-size:0.67rem;cursor:pointer;border-radius:6px;transition:all .1s;
}
.adv-btn:hover{border-color:var(--surface2);color:var(--subtext1);}
.adv-btn.on-norm{border-color:var(--overlay1);color:var(--subtext1);}
.adv-btn.on-adv{border-color:var(--green);color:var(--green);background:var(--surface0);}
.adv-btn.on-dis{border-color:var(--red);color:var(--red);background:var(--surface0);}

.history{display:flex;flex-wrap:wrap;gap:4px;margin-top:0.5rem;}
.hchip{
  font-size:0.62rem;background:var(--mantle);border:1px solid var(--surface0);
  color:var(--overlay1);padding:2px 7px;border-radius:4px;
}

/* ── WEAPONS PANEL ── */
.weapon-list{display:flex;flex-direction:column;gap:6px;margin-bottom:0.75rem;}
.weapon-card{
  background:var(--mantle);border:1px solid var(--surface0);border-radius:8px;
  overflow:hidden;
}
.weapon-header{
  display:flex;align-items:center;gap:8px;padding:0.55rem 0.75rem;cursor:pointer;
  transition:background .1s;
}
.weapon-header:hover{background:var(--surface0);}
.w-key{
  font-size:0.62rem;background:var(--surface1);color:var(--overlay2);
  padding:1px 6px;border-radius:3px;min-width:20px;text-align:center;
}
.w-name{flex:1;font-size:0.78rem;color:var(--subtext1);}
.w-btns{display:flex;gap:5px;}
.w-roll-btn{
  padding:0.2rem 0.55rem;background:transparent;border:1px solid var(--surface1);
  color:var(--overlay2);font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  cursor:pointer;border-radius:4px;transition:all .1s;
}
.w-roll-btn.hit:hover{border-color:var(--blue);color:var(--blue);}
.w-roll-btn.dmg:hover{border-color:var(--peach);color:var(--peach);}
.w-roll-btn.hit.last{border-color:var(--blue);color:var(--blue);}
.w-roll-btn.dmg.last{border-color:var(--peach);color:var(--peach);}
.w-del{
  background:none;border:none;color:var(--overlay0);cursor:pointer;
  font-size:0.72rem;padding:0 2px;font-family:'JetBrains Mono',monospace;
  transition:color .1s;
}
.w-del:hover{color:var(--red);}
.w-last{
  font-size:0.65rem;color:var(--overlay0);padding:0 0.75rem 0.45rem;
  border-top:1px solid var(--surface0);padding-top:0.35rem;
  display:flex;gap:0.75rem;
}
.w-last span{color:var(--subtext0);}
.w-last .hit-val{color:var(--blue);}
.w-last .dmg-val{color:var(--peach);}

/* Add weapon modal */
.add-btn{
  display:flex;align-items:center;gap:6px;width:100%;
  background:var(--mantle);border:1px dashed var(--surface1);
  color:var(--overlay1);font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  padding:0.5rem 0.75rem;border-radius:8px;cursor:pointer;transition:all .1s;
}
.add-btn:hover{border-color:var(--mauve);color:var(--mauve);}

.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:100;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--mantle);border:1px solid var(--surface1);border-radius:12px;
  padding:1.25rem;width:340px;max-width:90vw;
}
.modal h3{font-size:0.85rem;color:var(--mauve);margin-bottom:1rem;font-weight:500;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:0.75rem;}
.field label{font-size:0.62rem;color:var(--overlay0);}
.field input{
  background:var(--crust);border:1px solid var(--surface0);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  padding:0.38rem 0.6rem;border-radius:6px;
}
.field input:focus{outline:none;border-color:var(--mauve);}
.field input::placeholder{color:var(--overlay0);}
.modal-hint{font-size:0.6rem;color:var(--overlay0);margin-bottom:1rem;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{
  background:none;border:1px solid var(--surface1);color:var(--overlay1);
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;
}
.btn-cancel:hover{border-color:var(--surface2);}
.btn-save{
  background:var(--mauve);color:var(--crust);border:none;
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:600;
  padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;opacity:1;transition:opacity .1s;
}
.btn-save:hover{opacity:.85;}
.empty{font-size:0.72rem;color:var(--overlay0);padding:0.5rem 0;}

/* ── RESULT PANE ── */
.result-pane{
  grid-area:result;
  border-left:1px solid var(--surface0);
  display:flex;flex-direction:column;
  padding:1.25rem 1rem;
  justify-content:center;
  gap:0;
}
.result-main{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;
}
.result-num{
  font-size:4rem;font-weight:600;color:var(--mauve);line-height:1;
  transition:color .15s;
}
.result-num.crit{color:var(--green);}
.result-num.fail{color:var(--red);}
.result-adv{display:flex;gap:14px;align-items:baseline;}
.result-adv .dropped{font-size:2rem;font-weight:600;color:var(--surface2);text-decoration:line-through;}
.result-tag{font-size:0.65rem;color:var(--overlay0);margin-top:5px;text-align:center;}
.result-break{font-size:0.65rem;color:var(--overlay1);margin-top:4px;text-align:center;}
.crit-flag{
  font-size:0.62rem;color:var(--green);letter-spacing:0.08em;
  text-align:center;margin-top:6px;min-height:14px;
}
.crit-flag.fail{color:var(--red);}

.result-weapon{
  border-top:1px solid var(--surface0);padding-top:0.85rem;margin-top:0.85rem;
}
.result-weapon-name{font-size:0.65rem;color:var(--overlay0);margin-bottom:0.5rem;}
.result-weapon-row{display:flex;gap:1rem;}
.result-weapon-cell{flex:1;text-align:center;}
.result-weapon-val{font-size:1.6rem;font-weight:600;}
.result-weapon-val.hit{color:var(--blue);}
.result-weapon-val.dmg{color:var(--peach);}
.result-weapon-lbl{font-size:0.6rem;color:var(--overlay0);margin-top:2px;}

@keyframes flash{0%{opacity:.2;transform:scale(.88);}100%{opacity:1;transform:scale(1);}}
.flash{animation:flash .16s ease;}

/* ── HINTS ── */
.hint-bar{
  grid-area:hints;border-top:1px solid var(--surface0);
  display:flex;gap:0.9rem;justify-content:center;flex-wrap:wrap;
  padding:0.42rem 1rem;background:var(--mantle);
}
.hint{font-size:0.6rem;color:var(--overlay0);display:flex;gap:3px;align-items:center;}
kbd{
  background:var(--surface0);color:var(--subtext0);
  padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.58rem;
}
</style>
</head>
<body>

<header>
  <div class="tabs">
    <button class="tab active" id="tab-dice" onclick="switchTab('dice')">dice</button>
    <button class="tab" id="tab-weapons" onclick="switchTab('weapons')">weapons</button>
  </div>
</header>

<!-- DICE PANEL -->
<div class="panel active" id="panel-dice">
  <div class="dice-grid">
    <button class="die-btn" onclick="rollDie(4)"><span>d4</span><span class="k">1</span></button>
    <button class="die-btn" onclick="rollDie(6)"><span>d6</span><span class="k">2</span></button>
    <button class="die-btn" onclick="rollDie(8)"><span>d8</span><span class="k">3</span></button>
    <button class="die-btn" onclick="rollDie(10)"><span>d10</span><span class="k">4</span></button>
    <button class="die-btn" onclick="rollDie(12)"><span>d12</span><span class="k">5</span></button>
    <button class="die-btn d20" onclick="rollDie(20)"><span>d20</span><span class="k">6</span></button>
    <button class="die-btn" onclick="rollDie(100)"><span>d%</span><span class="k">7</span></button>
    <button class="die-btn" onclick="rollDie(lastDie)"><span>↺</span><span class="k">space</span></button>
  </div>

  <div class="controls-row">
    <span class="ctrl-label">count</span>
    <button class="count-btn" onclick="changeCount(-1)">−</button>
    <span id="count-display">1</span>
    <button class="count-btn" onclick="changeCount(1)">+</button>
    <span style="width:1px;height:18px;background:var(--surface0);margin:0 4px;"></span>
    <span class="ctrl-label">mod</span>
    <input class="mod-input" type="number" id="modifier" value="0" min="-99" max="99"/>
  </div>

  <div class="adv-row">
    <button class="adv-btn on-norm" id="btn-norm" onclick="setAdv('normal')">normal <span style="color:var(--overlay0);font-size:0.58rem;">[Q]</span></button>
    <button class="adv-btn" id="btn-adv" onclick="setAdv('adv')">adv <span style="color:var(--overlay0);font-size:0.58rem;">[W]</span></button>
    <button class="adv-btn" id="btn-dis" onclick="setAdv('dis')">dis <span style="color:var(--overlay0);font-size:0.58rem;">[E]</span></button>
  </div>

  <div class="history" id="history"></div>
</div>

<!-- WEAPONS PANEL -->
<div class="panel" id="panel-weapons">
  <div class="weapon-list" id="weapon-list">
    <div class="empty" id="w-empty">no weapons saved — add one below</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ add weapon / spell</button>
</div>

<!-- RESULT PANE (always visible) -->
<div class="result-pane">
  <div class="result-main">
    <div id="adv-display" class="result-adv" style="display:none">
      <span class="result-num" id="kept-num">—</span>
      <span class="dropped" id="drop-num">—</span>
    </div>
    <div class="result-num" id="result-num" style="display:block">—</div>
    <div class="result-tag" id="result-tag">pick a die</div>
    <div class="result-break" id="result-break"></div>
    <div class="crit-flag" id="crit-flag"></div>
  </div>
  <div class="result-weapon" id="result-weapon" style="display:none">
    <div class="result-weapon-name" id="rw-name"></div>
    <div class="result-weapon-row">
      <div class="result-weapon-cell">
        <div class="result-weapon-val hit" id="rw-hit">—</div>
        <div class="result-weapon-lbl">to hit</div>
      </div>
      <div class="result-weapon-cell">
        <div class="result-weapon-val dmg" id="rw-dmg">—</div>
        <div class="result-weapon-lbl">damage</div>
      </div>
    </div>
  </div>
</div>

<!-- ADD WEAPON MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>add weapon / spell</h3>
    <div class="field">
      <label>name</label>
      <input id="w-name" placeholder="e.g. Longsword, Fireball" maxlength="30"/>
    </div>
    <div class="field">
      <label>to hit</label>
      <input id="w-hit" placeholder="e.g. 1d20+5"/>
    </div>
    <div class="field">
      <label>damage</label>
      <input id="w-dmg" placeholder="e.g. 1d8+3 or 8d6"/>
    </div>
    <div class="modal-hint">notation: NdX+M &nbsp;·&nbsp; leave to-hit blank for spells with no attack roll</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" onclick="saveWeapon()">save</button>
    </div>
  </div>
</div>

<div class="hint-bar">
  <span class="hint"><kbd>tab</kbd> switch panel</span>
  <span class="hint"><kbd>1–7</kbd> roll die</span>
  <span class="hint"><kbd>space</kbd> re-roll</span>
  <span class="hint"><kbd>=</kbd><kbd>-</kbd> dice count</span>
  <span class="hint"><kbd>Q/W/E</kbd> normal·adv·dis</span>
  <span class="hint"><kbd>1–9</kbd> weapon (weapons tab)</span>
</div>

<script>
let lastDie = 20, diceCount = 1, advMode = 'normal';
let history = [];
let weapons = JSON.parse(localStorage.getItem('dnd_weapons2') || '[]');
let currentTab = 'dice';

// ── TAB ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'weapons') renderWeapons();
}

// ── ADV ──
function setAdv(mode) {
  advMode = mode;
  document.getElementById('btn-norm').className = 'adv-btn' + (mode === 'normal' ? ' on-norm' : '');
  document.getElementById('btn-adv').className  = 'adv-btn' + (mode === 'adv'    ? ' on-adv'  : '');
  document.getElementById('btn-dis').className  = 'adv-btn' + (mode === 'dis'    ? ' on-dis'  : '');
}
setAdv('normal');

// ── DICE ──
function rnd(n) { return Math.floor(Math.random() * n) + 1; }

function changeCount(d) {
  diceCount = Math.max(1, Math.min(20, diceCount + d));
  document.getElementById('count-display').textContent = diceCount;
}

function rollDie(sides) {
  if (!sides || sides < 2) sides = lastDie;
  lastDie = sides;
  const mod = parseInt(document.getElementById('modifier').value) || 0;
  const count = diceCount;
  const rolls = Array.from({length: count}, () => rnd(sides));

  let total, tag, breakdown = '', isCrit = false, isFail = false;
  let advData = null;

  if (advMode !== 'normal' && sides === 20 && count === 1) {
    const r2 = rnd(20);
    const a = rolls[0], b = r2;
    const kept = advMode === 'adv' ? Math.max(a,b) : Math.min(a,b);
    const dropped = advMode === 'adv' ? Math.min(a,b) : Math.max(a,b);
    total = kept + mod;
    advData = {kept, dropped, mod};
    tag = '1d20' + fmtMod(mod) + ' (' + (advMode === 'adv' ? 'advantage' : 'disadvantage') + ')';
    if (kept === 20) isCrit = true;
    if (kept === 1) isFail = true;
  } else {
    const sum = rolls.reduce((a,b)=>a+b,0);
    total = sum + mod;
    tag = count + 'd' + sides + fmtMod(mod);
    if (count > 1) breakdown = '[' + rolls.join(', ') + ']';
    if (count === 1 && sides === 20 && rolls[0] === 20) isCrit = true;
    if (count === 1 && sides === 20 && rolls[0] === 1) isFail = true;
  }

  showResult(total, tag, breakdown, isCrit, isFail, advData);
  document.getElementById('result-weapon').style.display = 'none';
  addHistory(tag + ' = ' + total);
}

function fmtMod(m) { return m > 0 ? '+'+m : m < 0 ? ''+m : ''; }

function showResult(total, tag, breakdown, isCrit, isFail, advData) {
  const numEl = document.getElementById('result-num');
  const advEl = document.getElementById('adv-display');
  const keptEl = document.getElementById('kept-num');
  const dropEl = document.getElementById('drop-num');
  const tagEl = document.getElementById('result-tag');
  const breakEl = document.getElementById('result-break');
  const critEl = document.getElementById('crit-flag');

  const cls = isCrit ? 'result-num crit' : isFail ? 'result-num fail' : 'result-num';

  if (advData) {
    numEl.style.display = 'none';
    advEl.style.display = 'flex';
    keptEl.className = cls;
    keptEl.textContent = advData.kept + fmtMod(advData.mod);
    dropEl.textContent = advData.dropped;
    advEl.classList.add('flash');
    setTimeout(() => advEl.classList.remove('flash'), 200);
  } else {
    advEl.style.display = 'none';
    numEl.style.display = 'block';
    numEl.className = cls;
    numEl.textContent = total;
    numEl.classList.add('flash');
    setTimeout(() => numEl.classList.remove('flash'), 200);
  }

  tagEl.textContent = tag;
  breakEl.textContent = breakdown;
  critEl.className = 'crit-flag' + (isFail ? ' fail' : '');
  critEl.textContent = isCrit ? '★ natural 20' : isFail ? '☆ natural 1' : '';
}

function addHistory(entry) {
  history.unshift(entry);
  if (history.length > 10) history.pop();
  document.getElementById('history').innerHTML =
    history.map(h => `<span class="hchip">${h}</span>`).join('');
}

// ── WEAPONS ──
function parseNotation(str) {
  if (!str) return null;
  str = str.trim().replace(/\s/g,'').toLowerCase();
  const m = str.match(/^(\d+)d(\d+)([+-]\d+)?$/);
  if (!m) return null;
  return {count:+m[1], sides:+m[2], mod:+(m[3]||0)};
}

function rollNotation(str) {
  const p = parseNotation(str);
  if (!p) return null;
  const rolls = Array.from({length:p.count}, () => rnd(p.sides));
  const total = rolls.reduce((a,b)=>a+b,0) + p.mod;
  const nat = p.count === 1 && p.sides === 20 ? rolls[0] : null;
  return {total, rolls, nat};
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('w-name').focus();
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['w-name','w-hit','w-dmg'].forEach(id => document.getElementById(id).value = '');
}

function saveWeapon() {
  const name = document.getElementById('w-name').value.trim();
  const hit = document.getElementById('w-hit').value.trim();
  const dmg = document.getElementById('w-dmg').value.trim();
  if (!name || !dmg) return;
  if (hit && !parseNotation(hit)) { alert('invalid to-hit notation'); return; }
  if (!parseNotation(dmg)) { alert('invalid damage notation'); return; }
  weapons.push({name, hit: hit||'', dmg, lastHit:null, lastDmg:null});
  localStorage.setItem('dnd_weapons2', JSON.stringify(weapons));
  closeModal();
  renderWeapons();
}

function deleteWeapon(i) {
  weapons.splice(i,1);
  localStorage.setItem('dnd_weapons2', JSON.stringify(weapons));
  renderWeapons();
}

function rollWeapon(i, type) {
  const w = weapons[i];
  let hitResult = null, dmgResult = null;

  if (type === 'both' || type === 'hit') {
    if (w.hit) {
      hitResult = rollNotation(w.hit);
      weapons[i].lastHit = hitResult.total;
    }
  }
  if (type === 'both' || type === 'dmg') {
    dmgResult = rollNotation(w.dmg);
    weapons[i].lastDmg = dmgResult.total;
  }

  localStorage.setItem('dnd_weapons2', JSON.stringify(weapons));
  renderWeapons();

  // show in result pane
  const isCrit = hitResult && hitResult.nat === 20;
  const isFail = hitResult && hitResult.nat === 1;
  const displayVal = hitResult ? hitResult.total : (dmgResult ? dmgResult.total : 0);
  const tag = type === 'hit' ? w.name + ' to hit' : type === 'dmg' ? w.name + ' dmg' : w.name;

  if (hitResult || dmgResult) {
    showResult(displayVal, tag, '', isCrit, isFail, null);
    if (hitResult && dmgResult) {
      document.getElementById('result-weapon').style.display = 'block';
      document.getElementById('rw-name').textContent = w.name;
      document.getElementById('rw-hit').textContent = hitResult.total;
      document.getElementById('rw-dmg').textContent = dmgResult.total;
    } else {
      document.getElementById('result-weapon').style.display = 'none';
    }
    addHistory(tag + ': ' + (hitResult ? 'hit '+hitResult.total : '') + (hitResult && dmgResult ? ' / ' : '') + (dmgResult ? 'dmg '+dmgResult.total : ''));
  }
}

function renderWeapons() {
  const list = document.getElementById('weapon-list');
  if (weapons.length === 0) {
    list.innerHTML = '<div class="empty" id="w-empty">no weapons saved — add one below</div>';
    return;
  }
  list.innerHTML = weapons.map((w, i) => {
    const hasHit = !!w.hit;
    const hasLast = w.lastHit !== null || w.lastDmg !== null;
    return `
    <div class="weapon-card">
      <div class="weapon-header" onclick="rollWeapon(${i},'both')">
        <span class="w-key">${i+1}</span>
        <span class="w-name">${w.name}</span>
        <div class="w-btns" onclick="event.stopPropagation()">
          ${hasHit ? `<button class="w-roll-btn hit ${w.lastHit!==null?'last':''}" onclick="rollWeapon(${i},'hit')">hit</button>` : ''}
          <button class="w-roll-btn dmg ${w.lastDmg!==null?'last':''}" onclick="rollWeapon(${i},'dmg')">dmg</button>
          <button class="w-del" onclick="deleteWeapon(${i})">✕</button>
        </div>
      </div>
      <div class="w-last">
        ${hasHit ? `<span>hit: <span class="hit-val">${w.lastHit !== null ? w.lastHit : '—'}</span></span>` : ''}
        <span>dmg: <span class="dmg-val">${w.lastDmg !== null ? w.lastDmg : '—'}</span></span>
        <span style="color:var(--overlay0);font-size:0.58rem;margin-left:auto;">${hasHit?w.hit+' / ':''} ${w.dmg}</span>
      </div>
    </div>`;
  }).join('');
}
renderWeapons();

// ── KEYBOARD ──
const DICE_KEYS = {'1':4,'2':6,'3':8,'4':10,'5':12,'6':20,'7':100};

document.addEventListener('keydown', e => {
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input') return;
  const key = e.key;
  const kl = key.toLowerCase();

  if (key === 'Tab') {
    e.preventDefault();
    switchTab(currentTab === 'dice' ? 'weapons' : 'dice');
    return;
  }

  if (kl === 'q') { setAdv('normal'); return; }
  if (kl === 'w') { setAdv('adv'); return; }
  if (kl === 'e') { setAdv('dis'); return; }

  if (currentTab === 'dice') {
    if (DICE_KEYS[key]) { rollDie(DICE_KEYS[key]); return; }
    if (key === ' ') { e.preventDefault(); rollDie(lastDie); return; }
    if (key === '=' || key === '+') { changeCount(1); return; }
    if (key === '-') { changeCount(-1); return; }
  }

  if (currentTab === 'weapons') {
    const idx = parseInt(key) - 1;
    if (!isNaN(idx) && idx >= 0 && idx < weapons.length) {
      rollWeapon(idx, 'both');
    }
  }
});

// close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
// enter to save modal
document.getElementById('modal').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveWeapon();
  if (e.key === 'Escape') closeModal();
});
</script>
